name = "cf-feedback-aggregator"
main = "src/index.ts"
compatibility_date = "2024-12-01"

# Cron Triggers — reduced frequency to limit D1 usage (was 50%+)
[triggers]
crons = [
  "0 */6 * * *",    # GitHub, Dev.to — every 6 hours
  "30 */6 * * *",   # Discourse — every 6 hours (staggered)
  "0 */12 * * *",   # Reddit, Discord — every 12 hours
  "30 */12 * * *",  # HackerNews, StackOverflow — every 12 hours
  "0 0 * * *",      # Mock Tweets, Mock Tickets — once daily (midnight UTC)
]

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "feedback-db"
database_id = "86298e20-9860-47b1-861a-a4952b29b731"

# KV Namespace
[[kv_namespaces]]
binding = "INGRESS_STATE"
id = "d9a8b8ec267a443792436aca13d491fd"

# Queue Producer
[[queues.producers]]
binding = "FEEDBACK_QUEUE"
queue = "feedback-ingress"

# Queue Consumer
[[queues.consumers]]
queue = "feedback-ingress"
max_batch_size = 10
max_batch_timeout = 30

# Workers AI
[ai]
binding = "AI"

# Observability
[observability]
[observability.logs]
enabled = true
invocation_logs = true
